<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="np-playlist-audio-bars" width="24" height="24" aria-hidden="true">
	<defs>
		<style><![CDATA[
			.np-playlist-audio-bars { color: #f0f0f0; }
			.np-bar {
			fill: currentColor;
			transform-box: fill-box;
			-webkit-transform-box: fill-box;
			transform-origin: 50% 100%;
			-webkit-transform-origin: 50% 100%;
			animation-iteration-count: infinite;
			animation-timing-function: ease-in-out;
			shape-rendering: geometricPrecision;
			}
			.np-bar-0 { animation: np-bar-anim-0 1s 0s infinite; }
			.np-bar-1 { animation: np-bar-anim-1 0.6s 0.1s infinite; }
			.np-bar-2 { animation: np-bar-anim-2 1s 0.3s infinite; }
			.np-bar-3 { animation: np-bar-anim-3 0.8s 0.2s infinite; }

			@keyframes np-bar-anim-0 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.3); } }
			@keyframes np-bar-anim-1 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.6); } }
			@keyframes np-bar-anim-2 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.8); } }
			@keyframes np-bar-anim-3 { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.15); } }
		]]></style>
	</defs>

	<g>
		<rect class="np-bar np-bar-0" x="3"  y="6" width="3" height="12" />
		<rect class="np-bar np-bar-1" x="8"  y="6" width="3" height="12" />
		<rect class="np-bar np-bar-2" x="13" y="6" width="3" height="12" />
		<rect class="np-bar np-bar-3" x="18" y="6" width="3" height="12" />
	</g>
</svg>